{% extends "base.html" %}
{% block title %}Entrar{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-6">
        <div class="auth-card">
          <div class="auth-card-header">
            <div class="auth-logo">
              <img src="{{ url_for('public_static', filename='img/RECIBO.png') }}" alt="Recibo Táxi">
            </div>
            <h1 class="auth-title">Bem-vindo de volta</h1>
            <p class="auth-subtitle">Entre na sua conta para acessar seus recibos</p>
          </div>

          <form action="{{ url_for('login') }}" method="post" class="auth-form" novalidate>
            <div class="form-group-auth">
              <label for="email" class="form-label-auth">E-mail</label>
              <div class="input-icon-wrap">
                <i class="bi bi-envelope input-icon"></i>
                <input
                  type="email" id="email" name="email" class="form-control form-control-auth"
                  placeholder="seu@email.com" autocomplete="email" required
                  value="{{ (form or {}).get('email', '') }}"
                >
              </div>
            </div>

            <div class="form-group-auth">
              <label for="senha" class="form-label-auth">Senha</label>
              <div class="input-icon-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input
                  type="password" id="senha" name="senha" class="form-control form-control-auth"
                  placeholder="Sua senha" autocomplete="current-password" required
                >
              </div>
            </div>

            <button type="submit" class="btn btn-auth-submit w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Entrar na conta
            </button>
          </form>

          <div class="auth-divider"><span>ou</span></div>

          <div class="text-center">
            <p class="auth-switch-text">
              Não tem conta?
              <a href="{{ url_for('cadastro') }}" class="auth-switch-link">Criar conta grátis</a>
            </p>
            <p class="auth-switch-text mt-2">
              Quer gerar um recibo rápido?
              <a href="{{ url_for('gerador') }}" class="auth-switch-link">Gerar sem cadastro</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
